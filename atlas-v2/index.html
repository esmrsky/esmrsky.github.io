    async function callGemini(prompt, systemInstruction) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] }
      };
      
      let lastError;
      const delays = [1000, 2000, 4000, 8000, 16000];
      
      for (let attempt = 0; attempt <= 5; attempt++) {
        try {
          const response = await fetch(url, { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(payload) 
          });
          
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          
          const result = await response.json();
          let rawHtml = result.candidates?.[0]?.content?.parts?.[0]?.text || "<p>Error: No response generated from the intelligence engine.</p>";
          rawHtml = rawHtml.replace(/```html/gi, '').replace(/```/gi, '').trim();
          return rawHtml;
        } catch (error) {
          lastError = error;
          if (attempt < 5) await new Promise(resolve => setTimeout(resolve, delays[attempt]));
        }
      }
      return `<div class="bg-red-500/10 border border-red-500/30 p-5 rounded-xl text-red-500 text-lg">Error connecting to the diagnostic engine. Verify network and API status.</div>`;
    }

    function renderNav() {
      const base = 'nav-link flex items-center font-medium transition-colors text-gray-600 dark:text-gray-300 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10';

      document.getElementById('nav-desktop').innerHTML = NAV_ITEMS.map(item => `

          <i class="ph ${item.icon} text-base"></i>${item.label}
        </a>`).join('');

      document.getElementById('nav-mobile-links').innerHTML = NAV_ITEMS.map(item => `
        <a href="#${item.id}" data-nav="${item.id}" onclick="closeMobileNav()" class="${base} gap-2.5 px-3.5 py-3 rounded-xl text-sm border border-gray-200 dark:border-white/10">
          <i class="ph ${item.icon} text-lg"></i>${item.label}
        </a>`).join('');
    }

    function toggleMobileNav() {
      const panel = document.getElementById('nav-mobile');
      const open  = panel.classList.toggle('hidden') === false;
      document.getElementById('nav-toggle-icon').className = `ph ${open ? 'ph-x' : 'ph-list'} text-xl block`;
      document.getElementById('nav-toggle').setAttribute('aria-expanded', String(open));
    }

    function closeMobileNav() {
      const panel = document.getElementById('nav-mobile');
      if (panel && !panel.classList.contains('hidden')) toggleMobileNav();
    }

    function initNavObserver() {
      const sections = NAV_ITEMS.map(i => document.getElementById(i.id)).filter(Boolean);
      if (!sections.length || !('IntersectionObserver' in window)) return;

      const setActive = (id) => {
        document.querySelectorAll('[data-nav]').forEach(a => {
          const on = a.dataset.nav === id;
          NAV_ACTIVE.forEach(c => a.classList.toggle(c, on));
          NAV_IDLE.forEach(c => a.classList.toggle(c, !on));
        });
      };

      const obs = new IntersectionObserver(entries => {
        const visible = entries.filter(e => e.isIntersecting)
                               .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        if (visible.length) setActive(visible[0].target.id);
      }, { rootMargin: '-90px 0px -55% 0px', threshold: [0.05, 0.25, 0.5] });

      sections.forEach(s => obs.observe(s));
    }

            <div class="md:col-span-2 bg-white dark:bg-[#111] border border-gray-200 dark:border-white/10 shadow-sm rounded-2xl p-8">
                <span class="font-mono text-xs uppercase tracking-widest text-amber-600 dark:text-amber-400 block mb-4"><i class="ph ph-path"></i> Where You Are on the Road</span>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="border-t-4 border-t-red-500 bg-gray-50 dark:bg-white/[0.03] rounded-xl p-5">
                        <h4 class="font-serif text-lg text-gray-900 dark:text-white mb-1">Egypt</h4>
                        <p class="font-mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Bondage</p>
                        <p class="font-sans text-sm text-gray-700 dark:text-gray-300 leading-relaxed">${arch.seasons.egypt}</p>
                    </div>
                    <div class="border-t-4 border-t-amber-500 bg-gray-50 dark:bg-white/[0.03] rounded-xl p-5">
                        <h4 class="font-serif text-lg text-gray-900 dark:text-white mb-1">Desert</h4>
                        <p class="font-mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Dealing</p>
                        <p class="font-sans text-sm text-gray-700 dark:text-gray-300 leading-relaxed">${arch.seasons.desert}</p>
                    </div>
                    <div class="border-t-4 border-t-green-500 bg-green-50/50 dark:bg-green-900/10 rounded-xl p-5">
                        <h4 class="font-serif text-lg text-gray-900 dark:text-white mb-1">Promised Land</h4>
                        <p class="font-mono text-[10px] uppercase tracking-widest text-gray-500 mb-2">Destiny</p>
                        <p class="font-sans text-sm text-gray-800 dark:text-gray-200 leading-relaxed font-medium">${arch.seasons.promised}</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 bg-green-50 dark:bg-green-900/10 border-l-4 border-green-500 border border-green-200 dark:border-green-500/25 rounded-2xl p-8">
                <span class="font-mono text-xs uppercase tracking-widest text-green-700 dark:text-green-400 block mb-3"><i class="ph ph-key"></i> What Breakthrough Looks Like</span>
                <p class="font-sans text-base lg:text-lg text-gray-900 dark:text-gray-200 leading-relaxed">${arch.breakthrough}</p>
            </div>

            <div class="md:col-span-2 bg-blue-50 dark:bg-blue-900/10 border-l-4 border-blue-500 border border-blue-200 dark:border-blue-500/20 rounded-2xl p-8">
                <span class="font-mono text-xs uppercase tracking-widest text-blue-700 dark:text-blue-400 block mb-3"><i class="ph ph-users"></i> You're in Good Company</span>
                <p class="font-sans text-base text-gray-800 dark:text-gray-200 leading-relaxed mb-4">Scripture is full of people who carried this exact wiring — hit the same walls, and walked out free:</p>
                <div class="flex flex-wrap gap-2 mb-4">
                    ${arch.biblicalExamples.map(renderExample).join('')}
                </div>
                ${EXAMPLE_LEGEND}
                <div class="space-y-2 mt-5 pt-5 border-t border-blue-200/60 dark:border-blue-500/20">
                    ${arch.caseStudies.map(cs => `<p class="font-sans text-sm text-gray-700 dark:text-gray-300"><strong class="text-blue-800 dark:text-blue-300">${cs.title}</strong> (${cs.verse}) — ${cs.healing.split('. ')[0]}.</p>`).join('')}
                </div>
                <div class="mt-5 pt-5 border-t border-blue-200/60 dark:border-blue-500/20">
                    <p class="font-mono text-[10px] uppercase tracking-widest text-gray-500 mb-3">And long after Scripture closed</p>
                    ${arch.witnesses.map(w => `<p class="font-sans text-sm text-gray-700 dark:text-gray-300 mb-2"><strong class="text-indigo-700 dark:text-indigo-300">${w.name}</strong> <span class="text-gray-500 font-mono text-[10px]">${w.era}</span> — ${w.arc}</p>`).join('')}
                </div>
            </div>

            <div class="md:col-span-2 flex flex-col sm:flex-row items-center justify-between gap-4">
                <button onclick="openDrawer('${arch.tribe}')" class="w-full sm:w-auto bg-gray-900 dark:bg-white text-white dark:text-black px-8 py-4 rounded-full text-base font-medium hover:bg-red-600 dark:hover:bg-red-500 transition-all duration-300 shadow-md">
                    Open Full ${arch.tribe} Profile &rarr;
                </button>
                ${second ? `<p class="font-sans text-sm text-gray-600 dark:text-gray-400">Also resonating: <button onclick="openDrawer('${second.arch.tribe}')" class="text-red-600 dark:text-red-400 underline font-medium">${second.arch.name} (${second.arch.tribe})</button></p>` : ''}
            </div>
        </div>`;
    }

    // --- AI DIAGNOSTIC INTEGRATION (BENTO FORMATTING) ---
    window.runDiagnostic = async function() {
        const input = document.getElementById('ai-input').value;
        const btn = document.getElementById('ai-submit');
        if(!input.trim()) return;

        const container = document.getElementById('ai-result-container');
        const content = document.getElementById('ai-result-content');
        const loading = document.getElementById('ai-loading');

        btn.disabled = true; btn.classList.add('opacity-50');
        container.classList.remove('hidden');
        loading.classList.remove('hidden'); loading.classList.add('flex');
        content.innerHTML = '';

        if (!apiKey) {
            await new Promise(r => setTimeout(r, 400));
            const res = renderLocalResult(localDiagnostic(input));
            loading.classList.add('hidden'); loading.classList.remove('flex');
            content.innerHTML = res;
            btn.disabled = false; btn.classList.remove('opacity-50');
            return;
        }

        const stringifiedSchema = JSON.stringify(atlasData);
        const sys = `You are an elite clinical AI for the Convergence Atlas v8.4. 
        Map the user's input to the exact schema found here: ${stringifiedSchema}.
        
        CRITICAL INSTRUCTIONS:
        1. YOU MUST OUTPUT RAW HTML WITH TAILWIND CSS CLASSES. Do not use markdown blocks. 
        2. ENFORCE TYPOGRAPHY: Wrap ALL paragraphs in <p class="font-sans text-base lg:text-lg text-gray-800 dark:text-gray-200 leading-relaxed mb-4">. Wrap ALL headers in <h3 class="font-serif text-2xl text-gray-900 dark:text-white mb-2">. Use <span class="font-mono text-xs uppercase tracking-widest"> for tags.
        3. Design the output as a modern "Bento Box" grid using 'grid grid-cols-1 md:grid-cols-2 gap-6'.
        4. Use generous padding (p-8), rounded corners (rounded-2xl), and dark-mode compatible glassmorphic backgrounds (bg-white dark:bg-[#111] border border-gray-200 dark:border-white/10 shadow-sm).
        5. Use Phosphor Icons (e.g., <i class="ph ph-fire text-orange-500"></i>) and Emojis extensively.
        
        Grid Layout Requirements:
        - Box 1 (Full Width Header): Tribe, Archetype, Core Axis.
        - Box 2 (Half Width): Evil Desire (Lust) & Emotional Signature.
        - Box 3 (Half Width): Somatic Tripwire & Trauma Echo.
        - Box 4 (Full Width Warning bg-red-50 dark:bg-red-900/10): System Hijacker (Name the warfare spirit and its mechanic).
        - Box 5 (Full Width Accent bg-orange-50 dark:bg-orange-900/20 border-l-4 border-orange-500): Prescribe the exact 'firstFiveMinutes' action.
        - Box 6 (Full Width): Long-term Protocol (Mindset, Boundary, Altar Replacement).
        - Box 7 (Full Width Accent bg-blue-50 dark:bg-blue-900/10 border-l-4 border-blue-500): MUST quote 2-3 specific, relevant Bible verses (styled beautifully with 'font-serif italic text-xl') that address their struggle. Include brief 1-sentence commentary on why each verse breaks the counterfeit loop.`;
        
        const res = await callGemini(`User breakdown: "${input}"`, sys);
        
        loading.classList.add('hidden'); loading.classList.remove('flex');
        content.innerHTML = res;
        btn.disabled = false; btn.classList.remove('opacity-50');
    };

    window.loadMoreCaseLaws = function() {
        document.querySelectorAll('.case-law-hidden').forEach(el => el.classList.remove('hidden'));
        document.getElementById('load-more-container').classList.add('hidden');
    };

    function boot() {
        renderApp();      // builds the sections
        renderNav();      // desktop + mobile links from NAV_ITEMS
        initNavObserver();// active-section highlighting (needs sections to exist)
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
    } else {
        boot();
    }

  </script>
</body>
</html>
