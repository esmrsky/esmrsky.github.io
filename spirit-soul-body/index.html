\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>MARK 12:30 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 09 · RENEWING THE MIND ============================== -->\n<section data-label=\"Renewing the Mind\" data-screen-label=\"15 Neuroplasticity\" data-speaker-notes=\"Paul says 'be transformed by the renewing of your mind.' For most of history we assumed the adult brain was fixed hardware. It isn't. It's plastic — it rewires. Hebb's principle from 1949: neurons that fire together, wire together. Every repeated thought physically strengthens a pathway. The most famous proof: London taxi drivers who memorize 25,000 streets grow measurably larger hippocampi — Maguire's study at UCL in 2000. So 'renewing the mind' isn't a metaphor for positive thinking. What you rehearse, you literally become. Which means our thought life is not neutral.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">Soul · Mind<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Renewing the mind, literally<\u002Fdiv>\n  <div style=\"display:flex;gap:76px;margin-top:40px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:600px\">\n      <div style=\"border-left:2px solid rgba(76,201,240,0.7);padding-left:22px;margin-bottom:30px\">\n        <div style=\"font-size:26px;line-height:1.45;color:#EEF1F8\">\"Do not conform to the pattern of this world, but be transformed by the renewing of your mind.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#6FD0EE;margin-top:12px\">ROMANS 12:2 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8\">The adult brain isn't fixed — it's <span style=\"color:#F1F4FA\">plastic<\u002Fspan>. Every repeated thought strengthens a neural pathway. The brain rewires around what we dwell on.<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.45;color:#9AA3B5;margin-top:20px\">Renewal isn't only a feeling. What you rehearse, you become.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:660px;flex-shrink:0\">\n      <div style=\"display:flex;flex-direction:column;gap:34px\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:0\">\n            <div style=\"width:20px;height:20px;border-radius:50%;background:#233047;border:1.5px solid rgba(76,201,240,0.5);flex-shrink:0\"><\u002Fdiv>\n            <div style=\"flex:1;height:2px;background:rgba(76,201,240,0.35);margin:0 -2px\"><\u002Fdiv>\n            <div style=\"width:20px;height:20px;border-radius:50%;background:#233047;border:1.5px solid rgba(76,201,240,0.5);flex-shrink:0\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:16px;color:#7A8496;margin-top:10px\">A thought, once — a faint trace<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex;align-items:center;gap:0\">\n            <div style=\"width:24px;height:24px;border-radius:50%;background:#1c3346;border:2px solid rgba(76,201,240,0.8);flex-shrink:0\"><\u002Fdiv>\n            <div style=\"flex:1;height:5px;background:rgba(76,201,240,0.65);margin:0 -3px;border-radius:3px\"><\u002Fdiv>\n            <div style=\"width:24px;height:24px;border-radius:50%;background:#1c3346;border:2px solid rgba(76,201,240,0.8);flex-shrink:0\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:16px;color:#7A8496;margin-top:10px\">Repeated — the pathway thickens<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display:flex;align-items:center;gap:0\">\n            <div style=\"width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,#8FDDFF,#4CC9F0);box-shadow:0 0 20px rgba(76,201,240,0.7);flex-shrink:0\"><\u002Fdiv>\n            <div style=\"flex:1;height:10px;background:linear-gradient(90deg,#4CC9F0,#8FDDFF,#4CC9F0);box-shadow:0 0 18px rgba(76,201,240,0.6);margin:0 -4px;border-radius:5px\"><\u002Fdiv>\n            <div style=\"width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,#8FDDFF,#4CC9F0);box-shadow:0 0 20px rgba(76,201,240,0.7);flex-shrink:0\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:16px;color:#8FDDFF;margin-top:10px\">Rehearsed — a strong, automatic path<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:34px;border-top:1px solid rgba(255,255,255,0.12);padding-top:20px\">\n        <div style=\"font-size:21px;line-height:1.45;color:#AEB6C8\">London cabbies who memorize 25,000 streets grow larger hippocampi.<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:15px;color:#6B7488;margin-top:8px\">Maguire et al., UCL · 2000 &nbsp;·&nbsp; \"Fire together, wire together\" — Hebb, 1949<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>ROM 12:2 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 10 · DMN & STILLNESS ============================== -->\n<section data-label=\"Stillness\" data-screen-label=\"16 Default Mode Network\" data-speaker-notes=\"Your brain has something called the Default Mode Network — Raichle named it in 2001. It switches ON when you're not focused on a task: it replays the past, rehearses conversations, loops on the self. A Harvard study found our minds wander about half of our waking hours, and — their words — 'a wandering mind is an unhappy mind.' Here's the beautiful part: contemplative prayer and meditation measurably quiet this network (Brewer, Yale, 2011), and just eight weeks of practice changes gray matter (Hölzel, Harvard, 2011). So when the psalmist says 'be still, and know that I am God,' stillness turns out to have a physiology. Quiet the chatter, and there's room to know Him.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">Soul · Attention<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1200px\">The wandering mind &amp; stillness<\u002Fdiv>\n  <div style=\"display:flex;gap:70px;margin-top:36px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:590px\">\n      <div style=\"font-size:26px;line-height:1.5;color:#C2C9D8\">The brain's <span style=\"color:#F1F4FA\">Default Mode Network<\u002Fspan> switches on when the mind wanders — replaying the past, looping on the self.<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.5;color:#C2C9D8;margin-top:20px\">Contemplative prayer <span style=\"color:#F1F4FA\">quiets<\u002Fspan> it. Weeks of practice reshape gray matter.<\u002Fdiv>\n      <div style=\"display:flex;gap:9px;flex-wrap:wrap;margin-top:26px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#8FDDFF;border:1px solid rgba(76,201,240,0.3);border-radius:999px;padding:6px 14px\">DMN · Raichle 2001<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#8FDDFF;border:1px solid rgba(76,201,240,0.3);border-radius:999px;padding:6px 14px\">Brewer, Yale 2011<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#8FDDFF;border:1px solid rgba(76,201,240,0.3);border-radius:999px;padding:6px 14px\">Hölzel, Harvard 2011<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px;margin-top:30px\">\n        <div style=\"font-size:26px;line-height:1.4;color:#EEF1F8\">\"Be still, and know that I am God.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:10px\">PSALM 46:10 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:670px;flex-shrink:0;display:flex;align-items:center;gap:16px\">\n      <div style=\"flex:1;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:22px 18px 18px;background:rgba(255,255,255,0.02)\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#8FDDFF;text-align:center;margin-bottom:8px\">MIND WANDERING<\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 240 200\" style=\"width:100%;height:auto\" data-om-raster=\"\">\n          <g stroke=\"#4CC9F0\" stroke-width=\"1.6\" opacity=\"0.55\">\n            <line x1=\"60\" y1=\"40\" x2=\"140\" y2=\"32\"><\u002Fline><line x1=\"140\" y1=\"32\" x2=\"200\" y2=\"70\"><\u002Fline><line x1=\"60\" y1=\"40\" x2=\"95\" y2=\"95\"><\u002Fline><line x1=\"95\" y1=\"95\" x2=\"170\" y2=\"120\"><\u002Fline><line x1=\"200\" y1=\"70\" x2=\"170\" y2=\"120\"><\u002Fline><line x1=\"95\" y1=\"95\" x2=\"55\" y2=\"150\"><\u002Fline><line x1=\"170\" y1=\"120\" x2=\"135\" y2=\"165\"><\u002Fline><line x1=\"135\" y1=\"165\" x2=\"205\" y2=\"150\"><\u002Fline><line x1=\"170\" y1=\"120\" x2=\"205\" y2=\"150\"><\u002Fline><line x1=\"140\" y1=\"32\" x2=\"170\" y2=\"120\"><\u002Fline><line x1=\"55\" y1=\"150\" x2=\"135\" y2=\"165\"><\u002Fline>\n          <\u002Fg>\n          <g fill=\"#4CC9F0\" opacity=\"0.22\"><circle cx=\"60\" cy=\"40\" r=\"12\"><\u002Fcircle><circle cx=\"140\" cy=\"32\" r=\"12\"><\u002Fcircle><circle cx=\"200\" cy=\"70\" r=\"12\"><\u002Fcircle><circle cx=\"95\" cy=\"95\" r=\"12\"><\u002Fcircle><circle cx=\"170\" cy=\"120\" r=\"12\"><\u002Fcircle><circle cx=\"55\" cy=\"150\" r=\"12\"><\u002Fcircle><circle cx=\"135\" cy=\"165\" r=\"12\"><\u002Fcircle><circle cx=\"205\" cy=\"150\" r=\"12\"><\u002Fcircle><\u002Fg>\n          <g fill=\"#8FDDFF\"><circle cx=\"60\" cy=\"40\" r=\"7\"><\u002Fcircle><circle cx=\"140\" cy=\"32\" r=\"7\"><\u002Fcircle><circle cx=\"200\" cy=\"70\" r=\"7\"><\u002Fcircle><circle cx=\"95\" cy=\"95\" r=\"7\"><\u002Fcircle><circle cx=\"170\" cy=\"120\" r=\"7\"><\u002Fcircle><circle cx=\"55\" cy=\"150\" r=\"7\"><\u002Fcircle><circle cx=\"135\" cy=\"165\" r=\"7\"><\u002Fcircle><circle cx=\"205\" cy=\"150\" r=\"7\"><\u002Fcircle><\u002Fg>\n        <\u002Fsvg>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:16px;color:#9AA3B5;text-align:center;margin-top:6px\">self-referential loop<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:14px;letter-spacing:1px;color:#7A8496;text-align:center;flex-shrink:0;width:54px\">QUIETS<br>→<\u002Fdiv>\n      <div style=\"flex:1;border:1px solid rgba(255,194,75,0.25);border-radius:16px;padding:22px 18px 18px;background:rgba(255,194,75,0.03)\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;text-align:center;margin-bottom:8px\">STILLNESS<\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 240 200\" style=\"width:100%;height:auto\" data-om-raster=\"\">\n          <g stroke=\"#B7BFCE\" stroke-width=\"1.2\" opacity=\"0.12\">\n            <line x1=\"60\" y1=\"40\" x2=\"140\" y2=\"32\"><\u002Fline><line x1=\"140\" y1=\"32\" x2=\"200\" y2=\"70\"><\u002Fline><line x1=\"60\" y1=\"40\" x2=\"95\" y2=\"95\"><\u002Fline><line x1=\"95\" y1=\"95\" x2=\"170\" y2=\"120\"><\u002Fline><line x1=\"95\" y1=\"95\" x2=\"55\" y2=\"150\"><\u002Fline><line x1=\"170\" y1=\"120\" x2=\"135\" y2=\"165\"><\u002Fline><line x1=\"135\" y1=\"165\" x2=\"205\" y2=\"150\"><\u002Fline>\n          <\u002Fg>\n          <g fill=\"#4A5568\"><circle cx=\"60\" cy=\"40\" r=\"6\"><\u002Fcircle><circle cx=\"140\" cy=\"32\" r=\"6\"><\u002Fcircle><circle cx=\"200\" cy=\"70\" r=\"6\"><\u002Fcircle><circle cx=\"170\" cy=\"120\" r=\"6\"><\u002Fcircle><circle cx=\"55\" cy=\"150\" r=\"6\"><\u002Fcircle><circle cx=\"135\" cy=\"165\" r=\"6\"><\u002Fcircle><circle cx=\"205\" cy=\"150\" r=\"6\"><\u002Fcircle><\u002Fg>\n          <circle cx=\"95\" cy=\"95\" r=\"16\" fill=\"#FFC24B\" opacity=\"0.28\"><\u002Fcircle>\n          <circle cx=\"95\" cy=\"95\" r=\"9\" fill=\"#FFD98A\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:16px;color:#9AA3B5;text-align:center;margin-top:6px\">the loop dims · attention frees<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>PS 46:10 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 11 · GUARDING THE HEART ============================== -->\n<section data-label=\"Guard the Heart\" data-screen-label=\"17 Emotional Health\" data-speaker-notes=\"'Above all else, guard your heart, for everything you do flows from it.' The soul's emotions aren't the enemy — but they can't be the driver either. Here's a striking finding: Matt Lieberman at UCLA showed that simply putting a feeling into words — affect labeling — reduces activity in the amygdala, the brain's alarm. Dan Siegel calls it 'name it to tame it.' Naming an emotion pulls the prefrontal cortex online and calms the threat response. That's exactly what the psalms of lament do — they name grief honestly, out loud, and then turn it toward God. So guarding the heart isn't suppressing feeling or being ruled by it. It's a third way: feel it, name it, bring it to God.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">Soul · Emotion<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Guarding the heart<\u002Fdiv>\n  <div style=\"display:flex;gap:76px;margin-top:38px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:600px\">\n      <div style=\"border-left:2px solid rgba(181,123,255,0.7);padding-left:22px;margin-bottom:28px\">\n        <div style=\"font-size:26px;line-height:1.45;color:#EEF1F8\">\"Above all else, guard your heart, for everything you do flows from it.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#C6A3FF;margin-top:12px\">PROVERBS 4:23 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.5;color:#C2C9D8\">Putting a feeling into words — <span style=\"color:#F1F4FA\">affect labeling<\u002Fspan> — lowers activity in the amygdala, the brain's alarm.<\u002Fdiv>\n      <div style=\"font-size:23px;line-height:1.45;color:#9AA3B5;margin-top:18px\">Not suppressed. Not in charge. Named — the way the psalms of lament name grief, then turn it Godward.<\u002Fdiv>\n      <div style=\"display:flex;gap:9px;flex-wrap:wrap;margin-top:24px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#C6A3FF;border:1px solid rgba(181,123,255,0.3);border-radius:999px;padding:6px 14px\">Affect labeling · Lieberman, UCLA 2007<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:660px;flex-shrink:0\">\n      <div style=\"display:flex;align-items:flex-end;gap:44px;height:300px;padding:0 30px\">\n        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#F0776A;margin-bottom:12px\">HIGH<\u002Fdiv>\n          <div style=\"width:100%;max-width:150px;height:240px;border-radius:12px 12px 0 0;background:linear-gradient(180deg,#F0776A,rgba(240,119,106,0.25));box-shadow:0 0 40px rgba(240,119,106,0.25)\"><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;color:#CBD2E0;margin-top:16px;text-align:center\">Feeling <span style=\"color:#F0776A\">unnamed<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#8FDDFF;margin-bottom:12px\">LOW<\u002Fdiv>\n          <div style=\"width:100%;max-width:150px;height:96px;border-radius:12px 12px 0 0;background:linear-gradient(180deg,#4CC9F0,rgba(76,201,240,0.25));box-shadow:0 0 40px rgba(76,201,240,0.3)\"><\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;color:#CBD2E0;margin-top:16px;text-align:center\">Feeling <span style=\"color:#8FDDFF\">named in words<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:14px;letter-spacing:1px;color:#6B7488;text-align:center;margin-top:8px\">AMYGDALA RESPONSE<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;margin-top:26px;border-top:1px solid rgba(255,255,255,0.12);padding-top:22px\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:#EEF1F8\">Feel it<\u002Fspan>\n        <span style=\"color:#59637A\">→<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:#EEF1F8\">Name it<\u002Fspan>\n        <span style=\"color:#59637A\">→<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;color:#FFD98A\">Bring it to God<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>PROV 4:23 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 12 · PART III · SPIRIT ============================== -->\n<section data-label=\"Part III · Spirit\" data-screen-label=\"18 Spirit\" data-speaker-notes=\"Part three: the spirit. God-conscious. This is the innermost core — the part of you made to commune with God. Conscience, intuition, communion. When you were born again, this is what came alive. Romans 8:16 — 'The Spirit himself testifies with our spirit that we are God's children.' Here science goes quiet; you can't put the spirit under a microscope. But we can talk about how the spirit speaks, and how to tell its voice from the noise.\" style=\"background:radial-gradient(1200px 950px at 74% 50%, rgba(255,194,75,0.16), transparent 60%), radial-gradient(900px 700px at 20% 20%, rgba(255,194,75,0.05), transparent 60%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;overflow:hidden\">\n  <div style=\"position:absolute;left:150px;top:0;bottom:0;width:880px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:22px;letter-spacing:7px;color:#E8B45A;margin-bottom:26px\">PART III<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:158px;line-height:0.94;letter-spacing:-4px;color:#FFC24B\">SPIRIT<\u002Fdiv>\n    <div style=\"font-weight:500;font-size:46px;color:#F1F4FA;margin-top:14px\">God-conscious<\u002Fdiv>\n    <div style=\"font-weight:400;font-size:29px;line-height:1.5;color:#A7B0C4;max-width:600px;margin-top:26px\">The innermost core, where we commune with God — conscience, intuition, communion.<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:18px;margin-top:42px\">\n      <div style=\"width:50px;height:2px;background:rgba(255,194,75,0.6)\"><\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:1px;color:#98A2B6\">\"The Spirit testifies with our spirit\" — ROM 8:16<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;right:160px;top:50%;transform:translateY(-50%);width:600px;height:600px\">\n    <div style=\"position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,0.11)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:392px;height:392px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(255,255,255,0.12)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:230px;height:230px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 37%, rgba(255,255,255,0.55), rgba(255,248,225,0) 42%), radial-gradient(circle at 50% 52%, #FFF4D6 0%, #FFE09A 28%, #FFC24B 54%, rgba(250,182,72,0.30) 72%, rgba(250,182,72,0) 86%);box-shadow:0 0 50px 3px rgba(255,216,140,0.5), 0 0 160px 34px rgba(255,182,74,0.30);animation:pulseGlow 5s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:14px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:15px;letter-spacing:3px;color:#59637A\">BODY<\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:120px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:15px;letter-spacing:3px;color:#59637A\">SOUL<\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:17px;font-weight:700;letter-spacing:3px;color:#3A2A05\">SPIRIT<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 13 · STILL SMALL VOICE ============================== -->\n<section data-label=\"Still Small Voice\" data-screen-label=\"19 Hearing God\" data-speaker-notes=\"How does the spirit hear God? The classic text is 1 Kings 19. Elijah is on the mountain. A great wind tears the rocks — but the Lord was not in the wind. Then an earthquake — not in the earthquake. Then fire — not in the fire. And after the fire, a gentle whisper. That's how God most often speaks: not in the spectacular, but in the quiet. Which is sobering, because the noise of the body and soul — stress, rumination, hurry — can drown out a whisper. Jesus says 'my sheep listen to my voice.' Practically, God speaks through Scripture first, and confirms through settled peace, wise counsel, and circumstances. And notice — this is exactly why stillness matters: quiet the network we saw earlier, and the whisper becomes audible.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(255,194,75,0.06), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.08), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#FFC24B;box-shadow:0 0 12px #FFC24B\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#E8B45A\">Spirit · Hearing God<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">The still, small voice<\u002Fdiv>\n  <div style=\"display:flex;gap:76px;margin-top:38px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:600px\">\n      <div style=\"font-size:26px;line-height:1.5;color:#C2C9D8\">God most often speaks not in the spectacular, but in the quiet. The noise of body and soul can drown a whisper.<\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px;margin-top:26px\">\n        <div style=\"font-size:24px;line-height:1.4;color:#EEF1F8\">\"My sheep listen to my voice; I know them, and they follow me.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:10px\">JOHN 10:27 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#7A8496;margin-top:30px;margin-bottom:14px\">HE OFTEN CONFIRMS THROUGH —<\u002Fdiv>\n      <div style=\"display:flex;gap:9px;flex-wrap:wrap\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;color:#DCE1EC;border:1px solid rgba(255,255,255,0.16);border-radius:999px;padding:8px 18px\">Scripture<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;color:#DCE1EC;border:1px solid rgba(255,255,255,0.16);border-radius:999px;padding:8px 18px\">Settled peace<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;color:#DCE1EC;border:1px solid rgba(255,255,255,0.16);border-radius:999px;padding:8px 18px\">Wise counsel<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;color:#DCE1EC;border:1px solid rgba(255,255,255,0.16);border-radius:999px;padding:8px 18px\">Circumstances<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:560px;flex-shrink:0\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#7A8496;margin-bottom:18px\">1 KINGS 19:11–12<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <div style=\"display:flex;align-items:center;gap:18px;opacity:0.5\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#8A93A6;width:200px\">WIND<\u002Fdiv><div style=\"font-size:19px;color:#7A8496\">the Lord was not in the wind<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;opacity:0.45\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#8A93A6;width:200px\">EARTHQUAKE<\u002Fdiv><div style=\"font-size:19px;color:#7A8496\">not in the earthquake<\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;opacity:0.4\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#8A93A6;width:200px\">FIRE<\u002Fdiv><div style=\"font-size:19px;color:#7A8496\">not in the fire<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#59637A;text-align:center;margin:4px 0\">↓<\u002Fdiv>\n        <div style=\"border:1.5px solid rgba(255,194,75,0.5);border-radius:16px;padding:24px 26px;background:radial-gradient(600px 200px at 30% 0%, rgba(255,194,75,0.14), transparent 70%);box-shadow:0 0 50px rgba(255,194,75,0.15)\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;color:#FFD98A;letter-spacing:-0.5px\">A gentle whisper<\u002Fdiv>\n          <div style=\"font-size:19px;color:#C2C9D8;margin-top:6px\">\"And after the fire came a gentle whisper.\"<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>1 KINGS 19 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 14 · GUT & HEART ============================== -->\n<section data-label=\"Gut &amp; Heart\" data-screen-label=\"20 Gut-Brain / Heart\" data-speaker-notes=\"Scripture keeps locating discernment lower than the head. The heart, of course — but also the gut. Paul's word for compassion, splagchna, literally means the bowels; the old translations say 'bowels of mercy.' And the body backs this up in a startling way. The gut contains around 500 million neurons — scientists literally call it the 'second brain.' The heart has its own little network of about 40,000 neurons. And the vagus nerve, the great mind-body cable, runs roughly 80% upward — carrying far more signal from body to brain than the other way. HeartMath's research links a smooth, coherent heart rhythm to calm and clarity. So a 'gut feeling' is real information. But — and this is the hinge for the rest of tonight — a gut feeling is data, not a verdict. Signal to be weighed, not a voice to obey.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(255,194,75,0.06), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.08), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#FFC24B;box-shadow:0 0 12px #FFC24B\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#E8B45A\">Spirit · Intuition<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Gut feelings &amp; the listening heart<\u002Fdiv>\n  <div style=\"display:flex;gap:80px;margin-top:36px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:640px\">\n      <div style=\"font-size:26px;line-height:1.5;color:#C2C9D8\">Scripture locates discernment in the <span style=\"color:#F1F4FA\">heart<\u002Fspan> — and even the <span style=\"color:#F1F4FA\">gut<\u002Fspan>. Paul's word for compassion, <span style=\"font-style:italic\">splagchna<\u002Fspan>, literally means the bowels.<\u002Fdiv>\n      <div style=\"font-size:26px;line-height:1.5;color:#C2C9D8;margin-top:20px\">The body agrees. The gut and heart carry their own neural networks; most of the vagus nerve runs <span style=\"color:#F1F4FA\">upward<\u002Fspan>, body to brain.<\u002Fdiv>\n      <div style=\"display:flex;gap:9px;flex-wrap:wrap;margin-top:24px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#FFD98A;border:1px solid rgba(255,194,75,0.3);border-radius:999px;padding:6px 14px\">Enteric nervous system · Gershon<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#FFD98A;border:1px solid rgba(255,194,75,0.3);border-radius:999px;padding:6px 14px\">Heart coherence · HeartMath<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px;margin-top:30px\">\n        <div style=\"font-size:25px;line-height:1.45;color:#EEF1F8\">A gut feeling is <span style=\"color:#FFD98A\">real data<\u002Fspan> — but data, not a verdict. A signal to weigh, not a voice to obey.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:540px;flex-shrink:0;position:relative;padding:8px 0\">\n      <div style=\"position:absolute;left:31px;top:56px;bottom:150px;width:2px;background:linear-gradient(180deg,rgba(76,201,240,0.6),rgba(255,194,75,0.6),rgba(181,123,255,0.6))\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:40px\">\n        <div style=\"display:flex;align-items:center;gap:28px\">\n          <div style=\"width:64px;height:64px;border-radius:50%;border:2px solid rgba(76,201,240,0.85);background:radial-gradient(circle,rgba(76,201,240,0.28),rgba(76,201,240,0.04));box-shadow:0 0 34px rgba(76,201,240,0.3);flex-shrink:0\"><\u002Fdiv>\n          <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:28px;color:#F1F4FA\">Head<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:17px;color:#9AA3B5;margin-top:3px\">~86 billion neurons<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:28px\">\n          <div style=\"width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,194,75,0.85);background:radial-gradient(circle,rgba(255,194,75,0.3),rgba(255,194,75,0.04));box-shadow:0 0 34px rgba(255,194,75,0.32);flex-shrink:0\"><\u002Fdiv>\n          <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:28px;color:#F1F4FA\">Heart<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:17px;color:#9AA3B5;margin-top:3px\">~40,000 neurons · a \"little brain\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:28px\">\n          <div style=\"width:64px;height:64px;border-radius:50%;border:2px solid rgba(181,123,255,0.85);background:radial-gradient(circle,rgba(181,123,255,0.28),rgba(181,123,255,0.04));box-shadow:0 0 34px rgba(181,123,255,0.3);flex-shrink:0\"><\u002Fdiv>\n          <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:28px;color:#F1F4FA\">Gut<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:17px;color:#9AA3B5;margin-top:3px\">~500 million neurons · the \"second brain\"<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:26px;border-top:1px solid rgba(255,255,255,0.12);padding-top:16px;font-family:'Space Mono',monospace;font-size:15px;letter-spacing:1px;color:#8A93A6\">VAGUS NERVE ≈ 80% of fibers carry signal <span style=\"color:#DCE1EC\">↑ upward<\u002Fspan> (body → brain)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>SIGNAL, NOT VERDICT<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 15 · WEIGHING WHAT YOU HEAR ============================== -->\n<section data-label=\"Weigh &amp; Test\" data-screen-label=\"21 Testing Spirits\" data-speaker-notes=\"So how do we weigh it? John says plainly: 'do not believe every spirit, but test the spirits.' Paul: 'Test them all; hold on to what is good.' The Bereans were commended because they examined the Scriptures every day to check what even the apostle Paul told them. Discernment is not cynicism and it's not gullibility — it's testing. Here's a simple grid you can run any impression, teaching, or gut-feeling through. Does it agree with Scripture? Does it exalt Jesus? Does it leave settled peace, or fear and striving? Is it confirmed by wise counsel? And — the one we'll land on next — does it bear good fruit over time?\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(255,194,75,0.06), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.08), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#FFC24B;box-shadow:0 0 12px #FFC24B\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#E8B45A\">Spirit · Discernment<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Weighing what you hear<\u002Fdiv>\n  <div style=\"display:flex;gap:80px;margin-top:36px;flex:1;align-items:center\">\n    <div style=\"width:470px;flex-shrink:0\">\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px\">\n        <div style=\"font-size:28px;line-height:1.4;color:#EEF1F8\">\"Do not believe every spirit, but test the spirits to see whether they are from God.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:12px\">1 JOHN 4:1 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;color:#B7BFCE;margin-top:28px\">Not cynicism. Not gullibility. Run every impression, teaching, or gut-feeling through the filter — \"test them all; hold on to what is good.\" <span style=\"color:#8A93A6;font-size:20px\">(1 Thess 5:21; the Bereans, Acts 17:11)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;display:flex;flex-direction:column\">\n      <div style=\"display:flex;gap:20px;align-items:flex-start;padding:18px 0\"><div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#FFD98A;width:44px;flex-shrink:0\">01<\u002Fdiv><div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Does it agree with Scripture?<\u002Fdiv><div style=\"font-size:20px;color:#9AA3B5;margin-top:2px\">The Word is the fixed measure.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;padding:18px 0\"><div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#FFD98A;width:44px;flex-shrink:0\">02<\u002Fdiv><div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Does it exalt Jesus?<\u002Fdiv><div style=\"font-size:20px;color:#9AA3B5;margin-top:2px\">The Spirit always points to Christ. (1 John 4:2–3)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;padding:18px 0\"><div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#FFD98A;width:44px;flex-shrink:0\">03<\u002Fdiv><div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Peace, or fear and striving?<\u002Fdiv><div style=\"font-size:20px;color:#9AA3B5;margin-top:2px\">Let the peace of Christ be the umpire. (Col 3:15)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;padding:18px 0\"><div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#FFD98A;width:44px;flex-shrink:0\">04<\u002Fdiv><div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Confirmed by wise counsel?<\u002Fdiv><div style=\"font-size:20px;color:#9AA3B5;margin-top:2px\">Safety in many advisers. (Prov 11:14)<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;padding:18px 0\"><div style=\"font-family:'Space Mono',monospace;font-size:20px;color:#FFD98A;width:44px;flex-shrink:0\">05<\u002Fdiv><div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Does it bear good fruit?<\u002Fdiv><div style=\"font-size:20px;color:#9AA3B5;margin-top:2px\">The test time reveals — next.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>1 JOHN 4:1 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 16 · KNOWN BY THEIR FRUIT ============================== -->\n<section data-label=\"By Their Fruit\" data-screen-label=\"22 Fruit Discernment\" data-speaker-notes=\"Jesus gives us the master test: 'by their fruit you will recognize them.' Not by how impressive, how gifted, how intense, how confident — by what grows over time. And Paul tells us exactly what the Spirit's fruit looks like: love, joy, peace, forbearance, kindness, goodness, faithfulness, gentleness, self-control. Contrast that with the fruit of the flesh — division, jealousy, fits of rage, chaos. So when you're weighing a teacher, a movement, an impression, even your own heart: give it time, and look at the harvest. The Spirit grows a garden. The flesh leaves wreckage. Fruit doesn't lie.\" style=\"background:radial-gradient(1200px 900px at 78% 55%, rgba(255,194,75,0.10), transparent 60%), radial-gradient(1000px 800px at 6% 5%, rgba(181,123,255,0.06), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#FFC24B;box-shadow:0 0 12px #FFC24B\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#E8B45A\">Spirit · Discernment<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Known by their fruit<\u002Fdiv>\n  <div style=\"display:flex;gap:80px;margin-top:36px;flex:1;align-items:center\">\n    <div style=\"width:500px;flex-shrink:0\">\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px\">\n        <div style=\"font-size:28px;line-height:1.4;color:#EEF1F8\">\"By their fruit you will recognize them.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:12px\">MATTHEW 7:16 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:25px;line-height:1.5;color:#C2C9D8;margin-top:28px\">Not by how impressive, gifted, or intense — by what <span style=\"color:#F1F4FA\">grows over time<\u002Fspan>. Give it time, then look at the harvest.<\u002Fdiv>\n      <div style=\"font-size:22px;line-height:1.45;color:#9AA3B5;margin-top:20px\">The flesh leaves wreckage — division, fear, chaos. The Spirit grows a garden. <span style=\"color:#7A8496;font-size:19px\">(Gal 5:19–23)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#E8B45A;margin-bottom:18px\">THE FRUIT OF THE SPIRIT · GALATIANS 5:22–23<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Love<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Joy<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Peace<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Forbearance<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Kindness<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Goodness<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Faithfulness<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Gentleness<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,194,75,0.32);border-radius:14px;padding:22px 16px;text-align:center;background:radial-gradient(200px 120px at 50% 0%, rgba(255,194,75,0.10), transparent 70%)\"><div style=\"font-size:26px;font-weight:600;color:#FFE7B0\">Self-control<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>MATT 7:16 · GAL 5 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== FRUIT OF THE FLESH ============================== -->\n<section data-label=\"Fruit of the Flesh\" data-screen-label=\"23 Fruit of the Flesh\" data-speaker-notes=\"We saw the Spirit's fruit — here's the contrast Paul draws in the very same breath: the fruit of the flesh. He calls these acts 'obvious.' Look at the texture of the list — sexual immorality, idolatry, hatred, discord, jealousy, fits of rage, selfish ambition, dissensions, factions, envy, drunkenness. Notice how many are relational. This is the wreckage side of the fruit test: whatever consistently grows this harvest — a teaching, a movement, a habit, an impulse in your own chest — its root is not the Spirit, however spiritual it looks. Paul's warning is sober, but the invitation underneath it is grace: walk by the Spirit, and you will not gratify the desires of the flesh.\" style=\"background:radial-gradient(1200px 900px at 78% 55%, rgba(240,119,106,0.09), transparent 60%), radial-gradient(1000px 800px at 6% 5%, rgba(181,123,255,0.06), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#F0776A;box-shadow:0 0 12px #F0776A\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#F0A79E\">The Contrast<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">The fruit of the flesh<\u002Fdiv>\n  <div style=\"display:flex;gap:80px;margin-top:36px;flex:1;align-items:center\">\n    <div style=\"width:500px;flex-shrink:0\">\n      <div style=\"border-left:2px solid rgba(240,119,106,0.7);padding-left:22px\">\n        <div style=\"font-size:26px;line-height:1.42;color:#EEF1F8\">\"The acts of the flesh are obvious... those who live like this will not inherit the kingdom of God.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#F0A79E;margin-top:12px\">GALATIANS 5:19–21 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;color:#C2C9D8;margin-top:26px\">The other harvest. The Spirit gathers and heals; the flesh <span style=\"color:#F1F4FA\">fractures and burns<\u002Fspan> — notice how much of the list is relational.<\u002Fdiv>\n      <div style=\"font-size:22px;line-height:1.45;color:#9AA3B5;margin-top:16px\">Whatever consistently grows this fruit, its root is not the Spirit — however spiritual it looks.<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:18px;line-height:1.5;color:#8FDDFF;margin-top:24px;border-top:1px solid rgba(255,255,255,0.12);padding-top:20px\">→ \"Walk by the Spirit, and you will not gratify the desires of the flesh.\" <span style=\"color:#6B7488\">GAL 5:16<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#F0A79E;margin-bottom:18px\">THE ACTS OF THE FLESH · GALATIANS 5:19–21<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Sexual immorality<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Impurity<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Debauchery<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Idolatry<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Witchcraft<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Hatred<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Discord<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Jealousy<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Fits of rage<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Selfish ambition<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Dissensions<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Factions<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Envy<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Drunkenness<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(240,119,106,0.30);border-radius:12px;padding:16px 10px;text-align:center;background:radial-gradient(180px 100px at 50% 0%, rgba(240,119,106,0.09), transparent 70%)\"><div style=\"font-size:20px;font-weight:600;color:#F3B7AF;line-height:1.2\">Orgies<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>GAL 5:19–21 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 17 · RHYTHMS ============================== -->\n<section data-label=\"Rhythms\" data-screen-label=\"24 Practices\" data-speaker-notes=\"Let's make it practical. If what we repeat we become — neurologically and spiritually — then formation is just the sum of our rhythms. Here are five, and notice each one tends a different dimension. Scripture and meditation renew the mind — that's the soul, the plasticity we talked about. Silence and solitude quiet the default mode network and tune us to the whisper — that's the spirit. Sabbath and rest reset the cortisol system — that's the body. Prayer and examen guard and order the heart — soul again. And fasting is the body deliberately serving the spirit. You don't need all five this week. Pick one.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.06), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.08), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#F1F4FA;box-shadow:0 0 12px rgba(255,255,255,0.6)\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#AEB6C8\">Practice<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-top:20px\">\n    <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px\">Rhythms that form us<\u002Fdiv>\n    <div style=\"font-size:23px;color:#8A93A6;max-width:440px;text-align:right;padding-bottom:8px\">What we repeat, we become — neurologically <span style=\"color:#AEB6C8\">and<\u002Fspan> spiritually.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:20px;flex:1;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"display:flex;align-items:center;gap:26px;padding:20px 0\">\n      <span style=\"width:14px;height:14px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0;flex-shrink:0\"><\u002Fspan>\n      <div style=\"width:400px;flex-shrink:0;font-size:31px;font-weight:600;color:#F1F4FA\">Scripture &amp; meditation<\u002Fdiv>\n      <div style=\"flex:1;font-size:25px;color:#AEB6C8\">Renews the mind — rewiring around truth<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#6FD0EE;width:80px;text-align:right\">SOUL<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:20px 0\">\n      <span style=\"width:14px;height:14px;border-radius:50%;background:#FFC24B;box-shadow:0 0 12px #FFC24B;flex-shrink:0\"><\u002Fspan>\n      <div style=\"width:400px;flex-shrink:0;font-size:31px;font-weight:600;color:#F1F4FA\">Silence &amp; solitude<\u002Fdiv>\n      <div style=\"flex:1;font-size:25px;color:#AEB6C8\">Quiets the loop; tunes us to the whisper<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;width:80px;text-align:right\">SPIRIT<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:20px 0\">\n      <span style=\"width:14px;height:14px;border-radius:50%;background:#B57BFF;box-shadow:0 0 12px #B57BFF;flex-shrink:0\"><\u002Fspan>\n      <div style=\"width:400px;flex-shrink:0;font-size:31px;font-weight:600;color:#F1F4FA\">Sabbath &amp; rest<\u002Fdiv>\n      <div style=\"flex:1;font-size:25px;color:#AEB6C8\">Resets the stress system — lowers cortisol<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#C6A3FF;width:80px;text-align:right\">BODY<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:20px 0\">\n      <span style=\"width:14px;height:14px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0;flex-shrink:0\"><\u002Fspan>\n      <div style=\"width:400px;flex-shrink:0;font-size:31px;font-weight:600;color:#F1F4FA\">Prayer &amp; examen<\u002Fdiv>\n      <div style=\"flex:1;font-size:25px;color:#AEB6C8\">Guards and orders the heart<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#6FD0EE;width:80px;text-align:right\">SOUL<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:20px 0\">\n      <span style=\"width:14px;height:14px;border-radius:50%;background:linear-gradient(90deg,#B57BFF,#FFC24B);box-shadow:0 0 12px rgba(255,194,75,0.6);flex-shrink:0\"><\u002Fspan>\n      <div style=\"width:400px;flex-shrink:0;font-size:31px;font-weight:600;color:#F1F4FA\">Fasting<\u002Fdiv>\n      <div style=\"flex:1;font-size:25px;color:#AEB6C8\">The body deliberately serving the spirit<\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#C6A3FF;width:80px;text-align:right\">BODY→SPIRIT<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>PICK ONE THIS WEEK<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 18 · CLOSING ============================== -->\n<section data-label=\"Kept Whole\" data-screen-label=\"25 Closing\" data-speaker-notes=\"We started with Paul's prayer; let's end there. 'May your whole spirit, soul and body be kept blameless... The one who calls you is faithful, and he will do it.' Notice the good news buried in that: the integrating, the keeping whole — that's His work, not ours. We tend the rhythms; He does the sanctifying. Three questions to take into your week and your group. First, which dimension — body, soul, or spirit — are you neglecting right now? Second, where might you have mistaken a soul-feeling for the Spirit's voice? And third, what one rhythm could you begin this week? Let's talk.\" style=\"background:radial-gradient(900px 720px at 78% 50%, rgba(255,194,75,0.11), transparent 60%), radial-gradient(1100px 860px at 82% 55%, rgba(76,201,240,0.08), transparent 62%), radial-gradient(1000px 820px at 74% 58%, rgba(181,123,255,0.11), transparent 60%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;overflow:hidden\">\n  <div style=\"position:absolute;left:150px;top:0;bottom:0;width:900px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#AEB6C8;margin-bottom:22px\">Benediction<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:74px;line-height:1.0;letter-spacing:-2.5px\">Kept whole &amp; blameless<\u002Fdiv>\n    <div style=\"font-size:27px;line-height:1.45;color:#C2C9D8;max-width:760px;margin-top:26px\">\"May your whole <span style=\"color:#FFC24B\">spirit<\u002Fspan>, <span style=\"color:#4CC9F0\">soul<\u002Fspan> and <span style=\"color:#B57BFF\">body<\u002Fspan> be kept blameless... <span style=\"color:#EEF1F8\">The one who calls you is faithful, and he will do it.<\u002Fspan>\"<\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#7A8496;margin-top:14px\">1 THESSALONIANS 5:23–24 · NIV<\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#8A93A6;margin-top:44px;margin-bottom:18px\">FOR DISCUSSION<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px;max-width:780px\">\n      <div style=\"display:flex;gap:18px;align-items:baseline\"><span style=\"font-family:'Space Mono',monospace;font-size:18px;color:#FFD98A\">1<\u002Fspan><span style=\"font-size:24px;line-height:1.4;color:#DCE1EC\">Which dimension — body, soul, or spirit — are you neglecting right now?<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:baseline\"><span style=\"font-family:'Space Mono',monospace;font-size:18px;color:#FFD98A\">2<\u002Fspan><span style=\"font-size:24px;line-height:1.4;color:#DCE1EC\">Where might you have mistaken a soul-feeling for the Spirit's voice?<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:baseline\"><span style=\"font-family:'Space Mono',monospace;font-size:18px;color:#FFD98A\">3<\u002Fspan><span style=\"font-size:24px;line-height:1.4;color:#DCE1EC\">What one rhythm could you begin this week?<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;right:150px;top:50%;transform:translateY(-50%);width:600px;height:600px\">\n    <div style=\"position:absolute;inset:0;border-radius:50%;border:2px solid rgba(181,123,255,0.75);box-shadow:0 0 80px rgba(181,123,255,0.28), inset 0 0 70px rgba(181,123,255,0.08)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:392px;height:392px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(76,201,240,0.8);box-shadow:0 0 70px rgba(76,201,240,0.24), inset 0 0 55px rgba(76,201,240,0.08)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:200px;height:200px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 3
