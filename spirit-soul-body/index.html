  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0515717d-3c33-446c-93d4-f2698a7e06c3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;background:#05070F}\n  a{color:#4CC9F0;text-decoration:none}\n  a:hover{color:#8FDDFF}\n  @keyframes pulseGlow{0%,100%{opacity:.92;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.03)}}\n  @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}\n  @keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"5f42d3d3-c8b4-4ce8-8c70-ffbf98415b0b#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<!-- ============================== 01 · TITLE ============================== -->\n<section data-label=\"Title\" data-screen-label=\"01 Title\" data-speaker-notes=\"Welcome. Tonight we look at one of the most quietly radical claims in Scripture: that you are not a body that happens to have feelings, or a brain that produces a soul. Paul prays for your 'whole spirit, soul and body.' Three dimensions, one person. And here's the hook — the more neuroscience learns about the brain, the more it keeps stumbling onto patterns Scripture described long ago. We'll hold that lightly, but it's striking.\" style=\"background:radial-gradient(1200px 820px at 66% 50%, rgba(76,201,240,0.10), transparent 62%), radial-gradient(1000px 760px at 70% 52%, rgba(181,123,255,0.12), transparent 60%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;overflow:hidden\">\n  <div style=\"position:absolute;left:150px;top:0;bottom:0;width:840px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:22px;letter-spacing:5px;color:#6FD0EE;text-transform:uppercase;margin-bottom:34px\">A Bible study in three parts<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:150px;line-height:0.98;letter-spacing:-3px\">\n      <div style=\"color:#FFC24B\">SPIRIT<\u002Fdiv>\n      <div style=\"color:#4CC9F0\">SOUL<\u002Fdiv>\n      <div style=\"color:#B57BFF\">BODY<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-weight:400;font-size:33px;line-height:1.4;color:#A7B0C4;max-width:660px;margin-top:40px\">The original design of a human being — and what neuroscience is now finding written into it.<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:20px;margin-top:46px\">\n      <div style=\"width:60px;height:1px;background:rgba(255,255,255,0.25)\"><\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:2px;color:#7A8496\">1 THESSALONIANS 5:23 · NIV<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;right:155px;top:50%;transform:translateY(-50%);width:660px;height:660px\">\n    <div style=\"position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(181,123,255,0.5);box-shadow:0 0 70px rgba(181,123,255,0.22), inset 0 0 70px rgba(181,123,255,0.07)\"><div style=\"position: absolute; left: 327px; top: 8px; transform: translateX(-50%); font-family: 'Space Mono',monospace; font-size: 17px; letter-spacing: 3px; color: #B57BFF\">BODY<\u002Fdiv><\u002Fdiv>\n    <div style=\"position:absolute;width:430px;height:430px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(76,201,240,0.55);box-shadow:0 0 60px rgba(76,201,240,0.18), inset 0 0 50px rgba(76,201,240,0.06)\"><div style=\"position: absolute; left: 212px; top: 10px; transform: translateX(-50%); font-family: 'Space Mono',monospace; font-size: 17px; letter-spacing: 3px; color: #4CC9F0\">SOUL<\u002Fdiv><\u002Fdiv>\n    <div style=\"position:absolute;width:210px;height:210px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 37%, rgba(255,255,255,0.55), rgba(255,248,225,0) 42%), radial-gradient(circle at 50% 52%, #FFF4D6 0%, #FFE09A 28%, #FFC24B 54%, rgba(250,182,72,0.30) 72%, rgba(250,182,72,0) 86%);box-shadow:0 0 42px 2px rgba(255,216,140,0.45), 0 0 120px 26px rgba(255,182,74,0.26);animation:pulseGlow 5s ease-in-out infinite\"><\u002Fdiv>\n    \n    \n    <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:#2A1D05\">SPIRIT<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 02 · THREE DIMENSIONS ============================== -->\n<section data-label=\"Three Dimensions\" data-screen-label=\"02 Three Dimensions\" data-speaker-notes=\"Start with the big idea: three ways of knowing. Your body is world-conscious — it knows the world through five senses. Your soul is self-conscious — it's the seat of your mind, your will, your emotions; it knows itself. Your spirit is God-conscious — the innermost part, made to commune with God. This world/self/God framing goes back to Watchman Nee and is a helpful map. Notice the arrows: the body faces outward to the world, the spirit faces inward toward God.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:88px 130px 88px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">Orientation<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:72px;line-height:1.03;letter-spacing:-2px;margin-top:22px;max-width:1050px\">One person, three dimensions<\u002Fdiv>\n  <div style=\"display:flex;gap:90px;margin-top:50px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:640px\">\n      <div style=\"font-weight:400;font-size:30px;line-height:1.5;color:#C2C9D8\">You are not a body that happens to have a soul. Scripture describes a <span style=\"color:#F1F4FA;font-weight:500\">whole person<\u002Fspan> — three interwoven dimensions, each with its own way of knowing.<\u002Fdiv>\n      <div style=\"margin-top:44px;display:flex;flex-direction:column;gap:26px\">\n        <div style=\"display:flex;gap:20px;align-items:baseline\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:2px;color:#B57BFF;width:120px;flex-shrink:0\">BODY<\u002Fdiv>\n          <div style=\"font-size:24px;line-height:1.4;color:#AEB6C8\"><span style=\"color:#F1F4FA\">World-conscious.<\u002Fspan> The five senses, the brain, the nervous system.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:baseline\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:2px;color:#4CC9F0;width:120px;flex-shrink:0\">SOUL<\u002Fdiv>\n          <div style=\"font-size:24px;line-height:1.4;color:#AEB6C8\"><span style=\"color:#F1F4FA\">Self-conscious.<\u002Fspan> Mind, will and emotions — who you are.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:baseline\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:2px;color:#FFC24B;width:120px;flex-shrink:0\">SPIRIT<\u002Fdiv>\n          <div style=\"font-size:24px;line-height:1.4;color:#AEB6C8\"><span style=\"color:#F1F4FA\">God-conscious.<\u002Fspan> The innermost core, made for communion.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:620px;height:520px;position:relative;flex-shrink:0\">\n      <div style=\"position:absolute;left:0;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:15px;letter-spacing:3px;color:#9B8BC4;writing-mode:vertical-rl;rotate:180deg\">← WORLD<\u002Fdiv>\n      <div style=\"position:absolute;right:0;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:15px;letter-spacing:3px;color:#C9A855;writing-mode:vertical-rl\">GOD →<\u002Fdiv>\n      <div style=\"position:absolute;width:490px;height:490px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(181,123,255,0.55);box-shadow:0 0 60px rgba(181,123,255,0.14), inset 0 0 60px rgba(181,123,255,0.05)\"><\u002Fdiv>\n      <div style=\"position:absolute;width:330px;height:330px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(76,201,240,0.6);box-shadow:0 0 50px rgba(76,201,240,0.12), inset 0 0 46px rgba(76,201,240,0.05)\"><\u002Fdiv>\n      <div style=\"position:absolute;width:170px;height:170px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 37%, rgba(255,255,255,0.55), rgba(255,248,225,0) 42%), radial-gradient(circle at 50% 52%, #FFF4D6 0%, #FFE09A 28%, #FFC24B 54%, rgba(250,182,72,0.30) 72%, rgba(250,182,72,0) 86%);box-shadow:0 0 32px 2px rgba(255,216,140,0.42), 0 0 92px 18px rgba(255,182,74,0.22);animation:pulseGlow 6s ease-in-out infinite\"><\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:24px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#B57BFF\">BODY<\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:106px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#4CC9F0\">SOUL<\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:3px;color:#2A1D05\">SPIRIT<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:50px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>THE FRAMEWORK<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 03 · FOUNDATIONAL TEXT ============================== -->\n<section data-label=\"The Text\" data-screen-label=\"03 Foundational Text\" data-speaker-notes=\"Two anchor texts. First, Paul's benediction in 1 Thessalonians 5:23 — he names all three: spirit, soul and body. Second, Hebrews 4:12 — the word of God is sharp enough to divide 'soul and spirit.' You don't divide two things that are identical. So Scripture treats soul and spirit as genuinely distinct — close, interwoven, but not the same. That's the textual foundation for everything tonight.\" style=\"background:radial-gradient(1200px 800px at 50% 120%, rgba(255,194,75,0.06), transparent 60%), radial-gradient(1000px 760px at 90% -10%, rgba(76,201,240,0.06), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:88px 140px 88px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#F1F4FA;box-shadow:0 0 12px rgba(255,255,255,0.6)\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#AEB6C8\">The Text<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;max-width:1400px\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:3px;color:#6FD0EE;margin-bottom:26px\">1 THESSALONIANS 5:23 · NIV<\u002Fdiv>\n    <div style=\"font-weight:400;font-size:52px;line-height:1.32;letter-spacing:-0.5px;color:#EEF1F8\">\"May God himself, the God of peace, sanctify you through and through. May your whole <span style=\"color:#FFC24B;font-weight:500\">spirit<\u002Fspan>, <span style=\"color:#4CC9F0;font-weight:500\">soul<\u002Fspan> and <span style=\"color:#B57BFF;font-weight:500\">body<\u002Fspan> be kept blameless at the coming of our Lord Jesus Christ.\"<\u002Fdiv>\n    <div style=\"margin-top:56px;display:flex;gap:34px;align-items:flex-start;border-top:1px solid rgba(255,255,255,0.12);padding-top:40px;max-width:1180px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:18px;letter-spacing:2px;color:#7A8496;white-space:nowrap;padding-top:6px\">HEBREWS 4:12<\u002Fdiv>\n      <div style=\"font-weight:400;font-size:29px;line-height:1.5;color:#B7BFCE\">\"...it penetrates even to <span style=\"color:#EEF1F8\">dividing soul and spirit<\u002Fspan>...\" — the word of God is sharp enough to distinguish what looks like one thing but is truly two.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:140px;right:140px;bottom:50px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>THE FOUNDATION<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 04 · THE THREE-PART DESIGN ============================== -->\n<section data-label=\"The Design\" data-screen-label=\"04 The Design\" data-speaker-notes=\"This is our map for the night. Picture concentric circles. Outermost is the body — it meets the world. In the middle is the soul — mind, will, emotion. At the very center, the luminous core, is the spirit — where God meets us. Everything flows through: what happens in the spirit affects the soul, which affects the body, and vice versa. We'll walk from the outside in — body, then soul, then spirit.\" style=\"background:radial-gradient(1000px 780px at 74% 50%, rgba(76,201,240,0.08), transparent 60%), radial-gradient(900px 720px at 78% 55%, rgba(181,123,255,0.10), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:88px 130px 88px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#FFC24B;box-shadow:0 0 12px #FFC24B\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#E8B45A\">The Model<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:72px;line-height:1.03;letter-spacing:-2px;margin-top:22px\">The three-part design<\u002Fdiv>\n  <div style=\"display:flex;gap:70px;margin-top:34px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:600px;display:flex;flex-direction:column;gap:30px\">\n      <div style=\"display:flex;gap:22px;align-items:flex-start\">\n        <span style=\"width:15px;height:15px;border-radius:50%;background:#B57BFF;box-shadow:0 0 14px #B57BFF;margin-top:9px;flex-shrink:0\"><\u002Fspan>\n        <div><div style=\"font-size:30px;font-weight:600;color:#F1F4FA\">Body <span style=\"font-weight:400;color:#8A93A6;font-size:24px\">— the outer layer<\u002Fspan><\u002Fdiv><div style=\"font-size:23px;line-height:1.45;color:#AEB6C8;margin-top:6px\">Meets the physical world through the senses.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start\">\n        <span style=\"width:15px;height:15px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 14px #4CC9F0;margin-top:9px;flex-shrink:0\"><\u002Fspan>\n        <div><div style=\"font-size:30px;font-weight:600;color:#F1F4FA\">Soul <span style=\"font-weight:400;color:#8A93A6;font-size:24px\">— the middle<\u002Fspan><\u002Fdiv><div style=\"font-size:23px;line-height:1.45;color:#AEB6C8;margin-top:6px\">Mind, will and emotion — the seat of the self.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start\">\n        <span style=\"width:15px;height:15px;border-radius:50%;background:#FFC24B;box-shadow:0 0 14px #FFC24B;margin-top:9px;flex-shrink:0\"><\u002Fspan>\n        <div><div style=\"font-size:30px;font-weight:600;color:#F1F4FA\">Spirit <span style=\"font-weight:400;color:#8A93A6;font-size:24px\">— the core<\u002Fspan><\u002Fdiv><div style=\"font-size:23px;line-height:1.45;color:#AEB6C8;margin-top:6px\">Where we commune with God. We'll move from outside in.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:600px;height:600px;position:relative;flex-shrink:0\">\n      <div style=\"position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(181,123,255,0.5);box-shadow:0 0 70px rgba(181,123,255,0.20), inset 0 0 70px rgba(181,123,255,0.06)\"><\u002Fdiv>\n      <div style=\"position:absolute;width:392px;height:392px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(76,201,240,0.55);box-shadow:0 0 60px rgba(76,201,240,0.16), inset 0 0 50px rgba(76,201,240,0.05)\"><\u002Fdiv>\n      <div style=\"position:absolute;width:190px;height:190px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 50% 37%, rgba(255,255,255,0.55), rgba(255,248,225,0) 42%), radial-gradient(circle at 50% 52%, #FFF4D6 0%, #FFE09A 28%, #FFC24B 54%, rgba(250,182,72,0.30) 72%, rgba(250,182,72,0) 86%);box-shadow:0 0 40px 2px rgba(255,216,140,0.45), 0 0 110px 24px rgba(255,182,74,0.24);animation:pulseGlow 5s ease-in-out infinite\"><\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:16px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:17px;letter-spacing:3px;color:#B57BFF\">BODY<\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:120px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:17px;letter-spacing:3px;color:#4CC9F0\">SOUL<\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:16px;font-weight:700;letter-spacing:3px;color:#2A1D05\">SPIRIT<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:50px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>OUTSIDE → IN<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 05 · SCIENCE MEETS SCRIPTURE ============================== -->\n<section data-label=\"How &amp; Why\" data-screen-label=\"05 How &amp; Why\" data-speaker-notes=\"People sometimes fear that if science can explain something, it explains God away — so let's clear that up before we go further. The key is that science and Scripture answer different questions. Science asks 'how': it traces the mechanism — the cortisol, the neurons, the networks. Scripture answers 'who' and 'why': who made it, and for what. A brain scan can show you exactly what happens in someone's body when they pray; it can never tell you whether God is on the other end of that prayer. Those aren't rival answers — they're different questions. Think of a watch: understanding every gear has never once disproved the watchmaker; if anything, the more intricate the mechanism, the more obvious the design. Paul says it plainly in Romans 1 — God's invisible qualities are clearly seen in what he has made. So all night, when the science lines up with Scripture, don't hear it as God being explained away. Hear it as the design pointing to a Designer.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:88px 130px 88px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">A word on method<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:72px;line-height:1.03;letter-spacing:-2px;margin-top:22px;max-width:1200px\">Does science explain God away?<\u002Fdiv>\n  <div style=\"font-weight:400;font-size:29px;line-height:1.5;color:#B7BFCE;max-width:1160px;margin-top:26px\">No — it explains the <span style=\"color:#F1F4FA\">mechanism<\u002Fspan>, not the <span style=\"color:#F1F4FA\">meaning<\u002Fspan>. A scan can show what happens in you when you pray or forgive. It can't tell you whether God is on the other end. Science and Scripture answer different questions.<\u002Fdiv>\n  <div style=\"display:flex;gap:40px;margin-top:44px\">\n    <div style=\"flex:1;border-top:2px solid rgba(76,201,240,0.6);padding-top:24px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:17px;letter-spacing:2px;color:#6FD0EE;margin-bottom:10px\">SCIENCE ASKS<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:56px;line-height:1;letter-spacing:-1px;color:#8FDDFF\">How?<\u002Fdiv>\n      <div style=\"font-size:23px;line-height:1.45;color:#AEB6C8;margin-top:14px\">Cortisol, neurons, networks — the <span style=\"color:#DCE1EC\">mechanism<\u002Fspan>. What happens, and how it works.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1;border-top:2px solid rgba(255,194,75,0.6);padding-top:24px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:17px;letter-spacing:2px;color:#E8B45A;margin-bottom:10px\">SCRIPTURE ANSWERS<\u002Fdiv>\n      <div style=\"font-weight:700;font-size:56px;line-height:1;letter-spacing:-1px;color:#FFD98A\">Who &amp; why?<\u002Fdiv>\n      <div style=\"font-size:23px;line-height:1.45;color:#AEB6C8;margin-top:14px\">Who made it, and for what — the <span style=\"color:#DCE1EC\">meaning<\u002Fspan> a mechanism can never hold.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:auto;margin-bottom:16px;border-top:1px solid rgba(255,255,255,0.12);padding-top:26px;display:flex;justify-content:space-between;align-items:flex-end;gap:48px\">\n    <div style=\"font-size:30px;line-height:1.42;color:#EEF1F8;max-width:960px\">Knowing <span style=\"color:#8FDDFF\">how<\u002Fspan> the watch works has never disproved the watchmaker. The clearer the design, the more there is to <span style=\"color:#FFD98A\">marvel<\u002Fspan> at — the mechanism points to a Maker.<\u002Fdiv>\n    <div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#7A8496;white-space:nowrap;text-align:right;line-height:1.7\">\"CLEARLY SEEN... FROM<br>WHAT HAS BEEN MADE\"<br><span style=\"color:#5A6478\">ROMANS 1:20 · NIV<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:50px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>HOW &amp; WHY<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== TWO BOOKS ============================== -->\n<section data-label=\"Two Books\" data-screen-label=\"06 Two Books\" data-speaker-notes=\"One more word on how science and Scripture relate, because it shapes everything after this. There's an old Christian idea that God has written two books. The first is the book of his Word — Scripture — which tells us who God is and why we exist. The second is the book of his works — creation — which shows us what we're made of and how it runs. Both have the same Author, so they cannot finally contradict; where they seem to, we're misreading one or the other. Kepler, doing his astronomy, called science 'thinking God's thoughts after him.' So when we look at a brain scan tonight, we haven't left the things of God — we're reading his second book. Scripture already told us we're fearfully and wonderfully made; the science just lets us trace a little of the how.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">The two books<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Two books, one Author<\u002Fdiv>\n  <div style=\"display:flex;gap:80px;margin-top:38px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:620px\">\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8\">A historic Christian conviction: God has written <span style=\"color:#F1F4FA\">two books<\u002Fspan> — the book of his Word, and the book of his works. The same Author wrote both, so they cannot finally contradict.<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;color:#9AA3B5;margin-top:20px\">Studying the brain, then, isn't a threat to faith. Done humbly, it's reading the second book — \"thinking God's thoughts after him.\"<\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px;margin-top:32px\">\n        <div style=\"font-size:24px;line-height:1.45;color:#EEF1F8\">\"The heavens declare the glory of God... I am fearfully and wonderfully made.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:12px\">PSALM 19:1 · 139:14 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:600px;flex-shrink:0\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#7A8496;margin-bottom:24px\">TWO BOOKS · ONE AUTHOR<\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;padding-bottom:24px\">\n        <span style=\"width:15px;height:15px;border-radius:50%;background:#FFC24B;box-shadow:0 0 14px #FFC24B;margin-top:8px;flex-shrink:0\"><\u002Fspan>\n        <div><div style=\"font-size:29px;font-weight:600;color:#F1F4FA\">The Book of the Word<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:6px\">SPECIAL REVELATION<\u002Fdiv><div style=\"font-size:22px;line-height:1.4;color:#AEB6C8;margin-top:8px\">Scripture — <span style=\"color:#DCE1EC\">who<\u002Fspan> God is, and <span style=\"color:#DCE1EC\">why<\u002Fspan> we exist.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;padding-top:24px;padding-bottom:26px\">\n        <span style=\"width:15px;height:15px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 14px #4CC9F0;margin-top:8px;flex-shrink:0\"><\u002Fspan>\n        <div><div style=\"font-size:29px;font-weight:600;color:#F1F4FA\">The Book of the Works<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:6px\">GENERAL REVELATION<\u002Fdiv><div style=\"font-size:22px;line-height:1.4;color:#AEB6C8;margin-top:8px\">Creation — <span style=\"color:#DCE1EC\">what<\u002Fspan> we're made of, and <span style=\"color:#DCE1EC\">how<\u002Fspan> it runs.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;border-top:1px solid rgba(255,255,255,0.12);padding-top:22px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#C6A3FF;white-space:nowrap\">ONE AUTHOR<\u002Fspan>\n        <span style=\"font-size:21px;line-height:1.4;color:#9AA3B5\">Two books, one hand — they cannot finally contradict.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>PS 19 · 139 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== CONVERGENCES I ============================== -->\n<section data-label=\"Convergences I\" data-screen-label=\"07 Convergences I\" data-speaker-notes=\"Let me show you what I mean — not with theory, but with a list. On the left, things Scripture has told God's people to do for centuries. On the right, what modern neuroscience finds actually happens in the brain when we do them. 'Be transformed by the renewing of your mind' — and the brain literally rewires around what we rehearse. 'Be still, and know that I am God' — and contemplative prayer measurably quiets the brain's restless wandering network. 'Give thanks in all circumstances' — and gratitude practice is tied to steadier mood and more regulation. 'Cast your anxiety on him' — and simply naming a feeling calms the brain's alarm. Notice the direction of travel: Scripture said it first; the science is catching up. We'll unpack several of these in depth as we go.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#F1F4FA;box-shadow:0 0 12px rgba(255,255,255,0.6)\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#AEB6C8\">Science &amp; Scripture · Convergences<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1200px\">Where the Word and the brain agree<\u002Fdiv>\n  <div style=\"font-size: 24px; line-height: 1.5; color: #9AA3B5; max-width: 1133px; margin-top: 16px; width: 1185px; height: 91px\">Left: what Scripture has asked for centuries. Right: what the brain shows when we actually do it.<\u002Fdiv>\n  <div style=\"margin-top:30px;flex:1;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"display:flex;align-items:center;gap:26px;padding-bottom:12px\">\n      <div style=\"flex:1;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#E8B45A\">SCRIPTURE SAYS<\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px\"><\u002Fdiv>\n      <div style=\"flex:1;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#6FD0EE\">THE BRAIN SHOWS<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.16)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Be transformed by the renewing of your mind.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">ROMANS 12:2<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">The brain is plastic — it rewires around what we rehearse.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">NEUROPLASTICITY · HEBB; MAGUIRE<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Be still, and know that I am God.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">PSALM 46:10<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Contemplative prayer quiets the mind-wandering Default Mode Network.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">DMN · BREWER, YALE<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Give thanks in all circumstances.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">1 THESSALONIANS 5:18<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Gratitude practice is linked to steadier mood and more regulation.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">GRATITUDE · AFFECTIVE NEUROSCIENCE<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Cast all your anxiety on him.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">1 PETER 5:7<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Naming a feeling — affect labeling — lowers the amygdala's alarm.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">\"NAME IT TO TAME IT\" · LIEBERMAN<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>THE CONVERGENCES<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== CONVERGENCES II ============================== -->\n<section data-label=\"Convergences II\" data-screen-label=\"08 Convergences II\" data-speaker-notes=\"The pattern keeps holding — and it reaches past the mind into the body and our relationships. 'Come to me and I will give you rest' — and rest lowers the stress hormones that, left unchecked, wear the brain down. 'A cheerful heart is good medicine' — and positive emotion really does track with better immune and stress markers. 'Forgive as the Lord forgave you' — and forgiveness is linked to lower blood pressure and anxiety; bitterness is measurably corrosive. 'Carry each other's burdens' — and connection buffers stress while isolation drives inflammation. A fair caution: these are associations, not laboratory proofs of God, and we hold them humbly. But taken together it's a striking picture — the Maker's instructions and the Maker's design keep turning out to match.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#F1F4FA;box-shadow:0 0 12px rgba(255,255,255,0.6)\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#AEB6C8\">Science &amp; Scripture · Convergences<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1200px\">The pattern keeps holding<\u002Fdiv>\n  <div style=\"font-size:24px;line-height:1.5;color:#9AA3B5;max-width:1100px;margin-top:16px\">Into the body, and into how we treat one another — the same design shows up.<\u002Fdiv>\n  <div style=\"margin-top:30px;flex:1;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"display:flex;align-items:center;gap:26px;padding-bottom:12px\">\n      <div style=\"flex:1;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#E8B45A\">SCRIPTURE SAYS<\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px\"><\u002Fdiv>\n      <div style=\"flex:1;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#6FD0EE\">THE BODY SHOWS<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.16)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Come to me... and I will give you rest.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">MATTHEW 11:28<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Rest lowers cortisol; chronic stress wears down the hippocampus.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">HPA AXIS · McEWEN<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"A cheerful heart is good medicine.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">PROVERBS 17:22<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Positive emotion is associated with lower stress hormones and better immune markers.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">PSYCHONEUROIMMUNOLOGY<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Forgive, as the Lord forgave you.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">COLOSSIANS 3:13<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Forgiveness is linked to lower blood pressure, cortisol, and anxiety.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">FORGIVENESS RESEARCH<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:26px;padding:15px 0\">\n      <div style=\"flex:1\"><div style=\"font-size:24px;line-height:1.38;color:#EEF1F8\">\"Carry each other's burdens.\"<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#E8B45A;margin-top:7px\">GALATIANS 6:2<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex-shrink:0;width:34px;text-align:center;font-family:'Space Mono',monospace;font-size:20px;color:#59637A\">↔<\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font-size:23px;line-height:1.38;color:#C2C9D8\">Social connection buffers stress; isolation raises inflammation.<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:15px;letter-spacing:2px;color:#6FD0EE;margin-top:7px\">SOCIAL NEUROSCIENCE<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>SCRIPTURE SAID IT FIRST<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 06 · PART I · BODY ============================== -->\n<section data-label=\"Part I · Body\" data-screen-label=\"09 Body\" data-speaker-notes=\"Part one: the body. World-conscious. This is the physical vessel — five senses, brain, nervous system. It's how we touch the world and how the world touches us. Scripture never treats the body as a prison to escape; it calls it a temple of the Holy Spirit. So caring for the body is a spiritual act, not a distraction from one.\" style=\"background:radial-gradient(1200px 950px at 74% 50%, rgba(181,123,255,0.16), transparent 60%), radial-gradient(900px 700px at 20% 20%, rgba(181,123,255,0.05), transparent 60%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;overflow:hidden\">\n  <div style=\"position:absolute;left:150px;top:0;bottom:0;width:880px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:22px;letter-spacing:7px;color:#C6A3FF;margin-bottom:26px\">PART I<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:158px;line-height:0.94;letter-spacing:-4px;color:#B57BFF\">BODY<\u002Fdiv>\n    <div style=\"font-weight:500;font-size:46px;color:#F1F4FA;margin-top:14px\">World-conscious<\u002Fdiv>\n    <div style=\"font-weight:400;font-size:29px;line-height:1.5;color:#A7B0C4;max-width:600px;margin-top:26px\">The physical vessel — five senses, brain, nervous system. How we touch, and are touched by, the world.<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:18px;margin-top:42px\">\n      <div style=\"width:50px;height:2px;background:rgba(181,123,255,0.6)\"><\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:1px;color:#98A2B6\">\"Your bodies are temples of the Holy Spirit\" — 1 COR 6:19<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;right:160px;top:50%;transform:translateY(-50%);width:600px;height:600px\">\n    <div style=\"position:absolute;inset:0;border-radius:50%;border:2px solid rgba(181,123,255,0.9);box-shadow:0 0 90px rgba(181,123,255,0.4), inset 0 0 80px rgba(181,123,255,0.12)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:392px;height:392px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(255,255,255,0.12)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:190px;height:190px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.015)\"><\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:14px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:#C6A3FF\">BODY<\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:120px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:15px;letter-spacing:3px;color:#59637A\">SOUL<\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:14px;letter-spacing:2px;color:#59637A\">SPIRIT<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 07 · STRESS & REST ============================== -->\n<section data-label=\"Stress &amp; Rest\" data-screen-label=\"10 Stress &amp; Rest\" data-speaker-notes=\"The body runs on a stress system — the HPA axis. A real threat triggers cortisol, which sharpens you to respond, and then should switch off. The problem of modern life is that it never switches off. Chronically elevated cortisol wears the body down and can even shrink the hippocampus, the brain's memory center — McEwen called this allostatic load. Here's the point: rest isn't optional maintenance. Jesus says 'come to me... I will give you rest.' Sabbath is a design feature, a built-in reset for the stress system.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.07), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.09), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#B57BFF;box-shadow:0 0 12px #B57BFF\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#C6A3FF\">Body · Rest<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Stress, cortisol &amp; the gift of rest<\u002Fdiv>\n  <div style=\"display:flex;gap:76px;margin-top:40px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:600px\">\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8\">A threat triggers <span style=\"color:#F1F4FA\">cortisol<\u002Fspan> — it sharpens you, then should switch off. Under chronic stress it never does.<\u002Fdiv>\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8;margin-top:22px\">Sustained cortisol wears the body down and can shrink the <span style=\"color:#F1F4FA\">hippocampus<\u002Fspan>, the brain's memory center.<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:30px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:16px;color:#8FDDFF;border:1px solid rgba(76,201,240,0.3);border-radius:999px;padding:7px 16px\">HPA axis<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:16px;color:#8FDDFF;border:1px solid rgba(76,201,240,0.3);border-radius:999px;padding:7px 16px\">Allostatic load · McEwen<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px;margin-top:34px\">\n        <div style=\"font-size:26px;line-height:1.45;color:#EEF1F8;font-weight:400\">\"Come to me, all you who are weary and burdened, and I will give you rest.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:12px\">MATTHEW 11:28 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:660px;flex-shrink:0\">\n      <svg sc-camel-view-box=\"0 0 660 430\" style=\"width:100%;height:auto\" data-om-raster=\"\">\n        <defs>\n          <linearGradient id=\"acuteFill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#4CC9F0\" stop-opacity=\"0.25\"><\u002Fstop><stop offset=\"1\" stop-color=\"#4CC9F0\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient>\n        <\u002Fdefs>\n        <line x1=\"70\" y1=\"40\" x2=\"70\" y2=\"360\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"70\" y1=\"360\" x2=\"630\" y2=\"360\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"1.5\"><\u002Fline>\n        <line x1=\"70\" y1=\"300\" x2=\"630\" y2=\"300\" stroke=\"rgba(255,255,255,0.14)\" stroke-width=\"1.5\" stroke-dasharray=\"5 7\"><\u002Fline>\n        <text x=\"80\" y=\"292\" fill=\"#6B7488\" font-family=\"'Space Mono',monospace\" font-size=\"14\">baseline<\u002Ftext>\n        <path d=\"M70 300 C 150 300, 175 90, 235 90 C 300 90, 330 300, 630 300\" fill=\"url(#acuteFill)\" stroke=\"none\"><\u002Fpath>\n        <path d=\"M70 300 C 150 300, 175 90, 235 90 C 300 90, 330 300, 630 300\" fill=\"none\" stroke=\"#4CC9F0\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M70 300 C 150 300, 190 150, 255 140 C 340 127, 360 150, 420 145 C 500 139, 540 158, 630 150\" fill=\"none\" stroke=\"#F0776A\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-dasharray=\"2 0\"><\u002Fpath>\n        <circle cx=\"235\" cy=\"90\" r=\"5\" fill=\"#4CC9F0\"><\u002Fcircle>\n        <text x=\"34\" y=\"45\" fill=\"#8A93A6\" font-family=\"'Space Mono',monospace\" font-size=\"14\" transform=\"rotate(-90 34 200)\" text-anchor=\"middle\" style=\"letter-spacing:2px\">CORTISOL<\u002Ftext>\n        <text x=\"350\" y=\"392\" fill=\"#8A93A6\" font-family=\"'Space Mono',monospace\" font-size=\"14\" text-anchor=\"middle\" style=\"letter-spacing:2px\">TIME →<\u002Ftext>\n        <g><rect x=\"330\" y=\"60\" width=\"14\" height=\"14\" rx=\"3\" fill=\"#4CC9F0\"><\u002Frect><text x=\"352\" y=\"72\" fill=\"#CBD2E0\" font-family=\"'Space Grotesk',sans-serif\" font-size=\"19\">Acute — spikes, then resets<\u002Ftext><\u002Fg>\n        <g><rect x=\"330\" y=\"92\" width=\"14\" height=\"14\" rx=\"3\" fill=\"#F0776A\"><\u002Frect><text x=\"352\" y=\"104\" fill=\"#CBD2E0\" font-family=\"'Space Grotesk',sans-serif\" font-size=\"19\">Chronic — stays elevated<\u002Ftext><\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>MATT 11:28 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 08 · BODY · TEMPLE ============================== -->\n<section data-label=\"Body · Temple\" data-screen-label=\"11 Temple\" data-speaker-notes=\"We said the body isn't a prison to escape — Scripture goes further and calls it a temple, the dwelling place of the Spirit. That reframes everything. There are two ditches. One says the body doesn't matter, so neglect it — that's an old error, gnosticism in modern dress. The other makes the body everything: worship its appetites, its image. The biblical road runs between them: stewardship. 'You are not your own; you were bought at a price. Honor God with your bodies.' So how you eat, move, rest and sleep is not beneath the spiritual life — it's part of it.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(181,123,255,0.08), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.07), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#B57BFF;box-shadow:0 0 12px #B57BFF\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#C6A3FF\">Body · Stewardship<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">A temple, not a prison<\u002Fdiv>\n  <div style=\"display:flex;gap:76px;margin-top:40px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:640px\">\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8\">Scripture never treats the body as a prison to escape — nor an idol to serve. It is the <span style=\"color:#F1F4FA\">dwelling place of the Spirit<\u002Fspan>, entrusted to your care.<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;color:#9AA3B5;margin-top:20px\">So how you eat, move, rest and sleep isn't beneath the spiritual life. It's part of it.<\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(181,123,255,0.7);padding-left:22px;margin-top:32px\">\n        <div style=\"font-size:25px;line-height:1.45;color:#EEF1F8\">\"You are not your own; you were bought at a price. Therefore honor God with your bodies.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#C6A3FF;margin-top:12px\">1 CORINTHIANS 6:19–20 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:600px;flex-shrink:0\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:3px;color:#C6A3FF;margin-bottom:6px\">TWO DITCHES, ONE ROAD<\u002Fdiv>\n      <div style=\"position:relative;padding:0 6px\">\n        <div style=\"position:absolute;left:80px;right:80px;top:57px;height:2px;background:linear-gradient(90deg,rgba(138,147,166,0.25),rgba(181,123,255,0.75),rgba(138,147,166,0.25))\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;position:relative\">\n          <div style=\"width:158px;text-align:center;opacity:0.55\">\n            <div style=\"width:20px;height:20px;border-radius:50%;border:2px solid #8A93A6;background:#0B0F1B;margin:24px auto 0\"><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;color:#B7BFCE;margin-top:20px\">Neglect<\u002Fdiv>\n            <div style=\"font-size:18px;color:#7A8496;margin-top:5px;line-height:1.35\">\"the body doesn't matter\"<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:200px;text-align:center\">\n            <div style=\"width:46px;height:46px;border-radius:50%;background:radial-gradient(circle,#D9BBFF,#B57BFF);box-shadow:0 0 34px rgba(181,123,255,0.6);margin:11px auto 0\"><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:#F1F4FA;margin-top:16px\">Steward<\u002Fdiv>\n            <div style=\"font-size:19px;color:#C6A3FF;margin-top:5px;line-height:1.35\">honor God with your body<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:158px;text-align:center;opacity:0.55\">\n            <div style=\"width:20px;height:20px;border-radius:50%;border:2px solid #8A93A6;background:#0B0F1B;margin:24px auto 0\"><\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;color:#B7BFCE;margin-top:20px\">Indulge<\u002Fdiv>\n            <div style=\"font-size:18px;color:#7A8496;margin-top:5px;line-height:1.35\">\"the body is everything\"<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:52px;border-top:1px solid rgba(255,255,255,0.12);padding-top:22px;font-size:22px;line-height:1.5;color:#AEB6C8\">The body is neither to be escaped nor obeyed — but <span style=\"color:#F1F4FA\">offered<\u002Fspan>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>1 COR 6:19 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 09 · BODY · SLEEP & MOVEMENT ============================== -->\n<section data-label=\"Body · Sleep &amp; Motion\" data-screen-label=\"12 Sleep &amp; Movement\" data-speaker-notes=\"Two more pieces of stewardship the Bible assumes and science now underlines: sleep and movement. When you sleep your brain isn't idle — it consolidates memory and literally washes out waste through the glymphatic system, discovered in 2013. Skimp on sleep and that cleaning never finishes. Movement matters too: exercise releases BDNF, sometimes called Miracle-Gro for the brain, growing new connections and lifting mood. And the psalmist already knew the heart of it — 'in vain you rise early and stay up late... for he grants sleep to those he loves.' Sleep is trust made physical: you lay down control, and God keeps the world turning without you.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(181,123,255,0.08), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(181,123,255,0.07), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#B57BFF;box-shadow:0 0 12px #B57BFF\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#C6A3FF\">Body · Care<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Sleep &amp; movement as worship<\u002Fdiv>\n  <div style=\"display:flex;gap:76px;margin-top:40px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:600px\">\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8\">The body runs on a design — a daily and weekly rhythm of work, rest and sleep. Honoring it is stewardship, not vanity.<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;color:#9AA3B5;margin-top:18px\">In sleep the brain consolidates memory and clears waste. Movement grows new connections and steadies the mind.<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:26px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:16px;color:#C6A3FF;border:1px solid rgba(181,123,255,0.3);border-radius:999px;padding:7px 16px\">Glymphatic clearance · 2013<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:16px;color:#C6A3FF;border:1px solid rgba(181,123,255,0.3);border-radius:999px;padding:7px 16px\">BDNF · exercise &amp; the brain<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(255,194,75,0.7);padding-left:22px;margin-top:32px\">\n        <div style=\"font-size:25px;line-height:1.45;color:#EEF1F8\">\"In vain you rise early and stay up late... for he grants sleep to those he loves.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#E8B45A;margin-top:12px\">PSALM 127:2 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:620px;flex-shrink:0\">\n      <div style=\"display:flex;gap:22px;align-items:flex-start;padding:16px 0\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:18px;color:#C6A3FF;width:132px;flex-shrink:0;letter-spacing:2px;padding-top:5px\">SLEEP<\u002Fdiv>\n        <div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Restores &amp; clears<\u002Fdiv><div style=\"font-size:21px;color:#9AA3B5;margin-top:4px;line-height:1.4\">Memory consolidates and the brain washes out waste as you rest. <span style=\"color:#7A8496\">(glymphatic system, 2013)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;padding:16px 0\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:18px;color:#C6A3FF;width:132px;flex-shrink:0;letter-spacing:2px;padding-top:5px\">MOVEMENT<\u002Fdiv>\n        <div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Feeds the mind<\u002Fdiv><div style=\"font-size:21px;color:#9AA3B5;margin-top:4px;line-height:1.4\">Exercise releases BDNF — \"fertilizer\" for new neural connections — and lifts mood.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:rgba(255,255,255,0.10)\"><\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;padding:16px 0\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:18px;color:#C6A3FF;width:132px;flex-shrink:0;letter-spacing:2px;padding-top:5px\">RHYTHM<\u002Fdiv>\n        <div><div style=\"font-size:26px;font-weight:600;color:#F1F4FA\">Over hustle<\u002Fdiv><div style=\"font-size:21px;color:#9AA3B5;margin-top:4px;line-height:1.4\">Light, dark and a weekly Sabbath keep the body in time. Rest is trust made visible.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<\u002Fspan> · <span style=\"color:#B57BFF\">BODY<\u002Fspan><\u002Fdiv><div>PS 127:2 · NIV<\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== 08 · PART II · SOUL ============================== -->\n<section data-label=\"Part II · Soul\" data-screen-label=\"13 Soul\" data-speaker-notes=\"Part two: the soul. Self-conscious. This is your mind, your will, your emotions — the seat of your personality. It's the 'you' that thinks, decides, and feels. The Hebrew word nephesh points to the whole living self. Most of our discipleship, and most of the science tonight, lives here — because the soul is where the body and the spirit meet.\" style=\"background:radial-gradient(1200px 950px at 74% 50%, rgba(76,201,240,0.16), transparent 60%), radial-gradient(900px 700px at 20% 20%, rgba(76,201,240,0.05), transparent 60%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;overflow:hidden\">\n  <div style=\"position:absolute;left:150px;top:0;bottom:0;width:880px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:22px;letter-spacing:7px;color:#6FD0EE;margin-bottom:26px\">PART II<\u002Fdiv>\n    <div style=\"font-weight:700;font-size:158px;line-height:0.94;letter-spacing:-4px;color:#4CC9F0\">SOUL<\u002Fdiv>\n    <div style=\"font-weight:500;font-size:46px;color:#F1F4FA;margin-top:14px\">Self-conscious<\u002Fdiv>\n    <div style=\"font-weight:400;font-size:29px;line-height:1.5;color:#A7B0C4;max-width:600px;margin-top:26px\">Mind, will and emotions — the seat of the self. The \"you\" that thinks, chooses, and feels.<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:18px;margin-top:42px\">\n      <div style=\"width:50px;height:2px;background:rgba(76,201,240,0.6)\"><\u002Fdiv>\n      <div style=\"font-family:'Space Mono',monospace;font-size:19px;letter-spacing:1px;color:#98A2B6\">\"Praise the Lord, my soul; all my inmost being\" — PS 103:1<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;right:160px;top:50%;transform:translateY(-50%);width:600px;height:600px\">\n    <div style=\"position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,0.11)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:392px;height:392px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(76,201,240,0.9);box-shadow:0 0 80px rgba(76,201,240,0.34), inset 0 0 60px rgba(76,201,240,0.10)\"><\u002Fdiv>\n    <div style=\"position:absolute;width:190px;height:190px;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.015)\"><\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:14px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:15px;letter-spacing:3px;color:#59637A\">BODY<\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:120px;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:#8FDDFF\">SOUL<\u002Fdiv>\n    <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Space Mono',monospace;font-size:14px;letter-spacing:2px;color:#59637A\">SPIRIT<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================== SOUL · FACULTIES ============================== -->\n<section data-label=\"Soul · Faculties\" data-screen-label=\"14 Mind, Will &amp; Emotion\" data-speaker-notes=\"Before the science of the soul, let's name its parts. Historically the soul has three faculties: the mind — what you know and think; the will — what you choose; and the emotions — what you feel. They're meant to work in concert: you know what's true, you feel its weight, you choose accordingly. Dysfunction is when one seizes the wheel — emotions dragging the will around, or a cold intellect that knows everything and loves nothing. Notice Jesus' summary of the whole law engages all of it: love God with all your heart, soul, mind and strength. Discipleship isn't just information for the mind or a feeling for the emotions — it's the whole soul, reordered under the spirit.\" style=\"background:radial-gradient(1100px 820px at 82% 6%, rgba(76,201,240,0.08), transparent 58%), radial-gradient(1000px 800px at 6% 100%, rgba(76,201,240,0.06), transparent 58%), #070A14;font-family:'Space Grotesk',sans-serif;color:#F1F4FA;padding:80px 130px 84px;display:flex;flex-direction:column;overflow:hidden\">\n  <div style=\"display:flex;align-items:center;gap:14px\">\n    <span style=\"width:11px;height:11px;border-radius:50%;background:#4CC9F0;box-shadow:0 0 12px #4CC9F0\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace;font-size:20px;letter-spacing:5px;text-transform:uppercase;color:#6FD0EE\">Soul · Faculties<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-weight:700;font-size:66px;line-height:1.03;letter-spacing:-2px;margin-top:20px;max-width:1150px\">Mind, will &amp; emotion<\u002Fdiv>\n  <div style=\"display:flex;gap:70px;margin-top:36px;flex:1;align-items:center\">\n    <div style=\"flex:1;max-width:620px\">\n      <div style=\"font-size:27px;line-height:1.5;color:#C2C9D8\">The soul has three faculties — the <span style=\"color:#F1F4FA\">mind<\u002Fspan> that knows, the <span style=\"color:#F1F4FA\">will<\u002Fspan> that chooses, and the <span style=\"color:#F1F4FA\">emotions<\u002Fspan> that respond.<\u002Fdiv>\n      <div style=\"font-size:24px;line-height:1.5;color:#9AA3B5;margin-top:20px\">They're made to work in concert: know what's true, feel its weight, choose accordingly. Trouble comes when one seizes the wheel — feeling that drags the will, or a cold mind that loves nothing.<\u002Fdiv>\n      <div style=\"border-left:2px solid rgba(76,201,240,0.7);padding-left:22px;margin-top:30px\">\n        <div style=\"font-size:24px;line-height:1.45;color:#EEF1F8\">\"Love the Lord your God with all your heart and with all your soul and with all your mind and with all your strength.\"<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#6FD0EE;margin-top:12px\">MARK 12:30 · NIV<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"width:580px;height:500px;position:relative;flex-shrink:0\">\n      <div style=\"position:absolute;width:300px;height:300px;left:130px;top:0;border-radius:50%;background:rgba(76,201,240,0.13);border:1.5px solid rgba(76,201,240,0.5)\"><\u002Fdiv>\n      <div style=\"position:absolute;width:300px;height:300px;left:30px;top:190px;border-radius:50%;background:rgba(76,201,240,0.13);border:1.5px solid rgba(76,201,240,0.5)\"><\u002Fdiv>\n      <div style=\"position:absolute;width:300px;height:300px;left:230px;top:190px;border-radius:50%;background:rgba(76,201,240,0.13);border:1.5px solid rgba(76,201,240,0.5)\"><\u002Fdiv>\n      <div style=\"position:absolute;left:280px;top:128px;transform:translate(-50%,-50%);text-align:center\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:36px;color:#EAF6FF\">Mind<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:17px;letter-spacing:3px;color:#6FD0EE;margin-top:6px\">KNOW<\u002Fdiv><\u002Fdiv>\n      <div style=\"position:absolute;left:168px;top:362px;transform:translate(-50%,-50%);text-align:center\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:36px;color:#EAF6FF\">Will<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:17px;letter-spacing:3px;color:#6FD0EE;margin-top:6px\">CHOOSE<\u002Fdiv><\u002Fdiv>\n      <div style=\"position:absolute;left:392px;top:362px;transform:translate(-50%,-50%);text-align:center\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:36px;color:#EAF6FF\">Emotion<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:17px;letter-spacing:3px;color:#6FD0EE;margin-top:6px\">FEEL<\u002Fdiv><\u002Fdiv>\n      <div style=\"position:absolute;left:280px;top:268px;transform:translate(-50%,-50%);text-align:center\"><div style=\"font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:2px;color:#8FDDFF;line-height:1.25\">THE<br>SELF<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:130px;right:130px;bottom:46px;display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:16px;letter-spacing:2px;color:#5A6478\"><div><span style=\"color:#FFC24B\">SPIRIT<\u002Fspan> · <span style=\"color:#4CC9F0\">SOUL<
